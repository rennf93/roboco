# RoboCo documentation site.
# Build:   uv run mkdocs build --strict
# Preview: uv run mkdocs serve
# Deploy:  handled in CI by .github/workflows/docs.yml (mkdocs gh-deploy → gh-pages).
site_name: RoboCo
site_url: https://rennf93.github.io/roboco/
site_description: >-
  RoboCo is a self-hosted AI agentic company — 25 AI agents and one human CEO
  that run as a complete software-development workforce, operated from a single
  control panel.
site_author: Renzo Franceschini
copyright: Copyright &copy; 2026 Renzo Franceschini — licensed under AGPL-3.0

repo_url: https://github.com/rennf93/roboco
repo_name: rennf93/roboco
edit_uri: edit/master/docs/

docs_dir: docs

# Everything under docs/ that is NOT user-facing: the agent-facing RAG corpus,
# the gitignored scratch trees, and the orphaned per-area stubs.
exclude_docs: |
  rag/
  internal/
  superpowers/
  backend/
  frontend/
  ux_ui/
  features/
  bugs/
  initiatives/
  self/
  models/README.md

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rennf93/roboco
      name: RoboCo on GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/watch?v=t1QNqJgBmkM
      name: The RoboCo intro on YouTube

