<!doctype html>
<html lang="en" data-composition-id="release-recap" data-composition-duration="20" data-fps="30">
  <head>
    <meta charset="utf-8" />
    <title>Release Recap - vertical (1080×1920)</title>
    <link rel="stylesheet" href="../../kit/kit.css" />
    <script src="props.js"></script>
    <script src="../../kit/kit.js"></script>
    <style>
      /* Orientation-specific placement only - component look lives in
         kit.css. Timing is identical between orientations (set inline on
         the elements below); only these positions change with the stage.
         Values match compositions/panel-demo/vertical.html exactly: this
         clip reuses the same single-card slot geometry, just cycling three
         releases through it instead of one task. */
      .pk-intake { --pk-intake-top: 24px; }
      .pk-column { --pk-column-top: 200px; }
      .pk-toast { --pk-toast-bottom: 160px; }
      .pk-outro { --pk-outro-bottom: 56px; }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="release-recap" data-width="1080" data-height="1920" data-start="0" data-duration="20" data-fps="30">
      <div class="pk-frame clip" data-start="0" data-duration="20" data-track-index="1">
        <aside class="pk-frame__sidebar">
          <div class="pk-frame__logo"></div>
          <div class="pk-frame__navitem"></div>
          <div class="pk-frame__navitem pk-frame__navitem--active"></div>
          <div class="pk-frame__navitem"></div>
          <div class="pk-frame__navitem"></div>
          <div class="pk-frame__navitem"></div>
        </aside>

        <header class="pk-frame__topbar">
          <div class="pk-frame__search">Search tasks, agents...</div>
          <div class="pk-frame__status clip" data-start="0" data-duration="20" data-track-index="0">
            <span class="pk-frame__statusdot"></span>
            <span>Live</span>
          </div>
        </header>

        <div class="pk-frame__content">
          <!-- Cold open: the recap line types into intake before the first beat. -->
          <div class="pk-intake clip" data-start="0.2" data-duration="19.6" data-track-index="2" style="animation-delay: 0.2s;">
            <div class="pk-intake__label">New task</div>
            <div class="pk-intake__field"><span id="typeIntro">3 releases in 6 days</span><span class="pk-caret"></span></div>
          </div>

          <!-- One kanban slot, reused for all three beats: each release's card
               is absolutely positioned at the same spot inside the column and
               painted after the previous, so the later card's solid
               background fully covers the one before it - a beat swap
               without duplicating the frame/cursor geometry per release. -->
          <div class="pk-column">
            <div class="pk-column__header">Tasks</div>

            <div class="pk-card clip" data-start="2" data-duration="18" data-track-index="3" style="position: absolute; top: 0; left: 0; right: 0; animation-delay: 2s;">
              <div class="pk-card__title">A2A becomes a real inbox</div>
              <div class="pk-card__meta">
                <span class="pk-chip pk-chip--gray">v0.18.0</span>
              </div>
              <div class="pk-card__status">
                <span class="pk-pill pk-pill--progress pk-pill--swap-out clip" data-start="2" data-duration="1.6" data-track-index="4" style="--pk-pill-enter-delay: 2s; --pk-pill-exit-delay: 3.6s;">in progress</span>
                <span class="pk-pill pk-pill--completed pk-pill--swap-in clip" data-start="4" data-duration="16" data-track-index="5" style="--pk-pill-enter-delay: 4s;">completed</span>
              </div>
            </div>

            <div class="pk-card clip" data-start="6" data-duration="14" data-track-index="6" style="position: absolute; top: 0; left: 0; right: 0; animation-delay: 6s;">
              <div class="pk-card__title">Panel-demo kit ships</div>
              <div class="pk-card__meta">
                <span class="pk-chip pk-chip--blue">v0.19.0</span>
              </div>
              <div class="pk-card__status">
                <span class="pk-pill pk-pill--progress pk-pill--swap-out clip" data-start="6" data-duration="1.6" data-track-index="7" style="--pk-pill-enter-delay: 6s; --pk-pill-exit-delay: 7.6s;">in progress</span>
                <span class="pk-pill pk-pill--completed pk-pill--swap-in clip" data-start="8" data-duration="12" data-track-index="8" style="--pk-pill-enter-delay: 8s;">completed</span>
              </div>
            </div>

            <div class="pk-card clip" data-start="10" data-duration="10" data-track-index="9" style="position: absolute; top: 0; left: 0; right: 0; animation-delay: 10s;">
              <div class="pk-card__title">Root-owned coverage lands</div>
              <div class="pk-card__meta">
                <span class="pk-chip pk-chip--orange">v0.20.0</span>
              </div>
              <div class="pk-card__status">
                <span class="pk-pill pk-pill--progress pk-pill--swap-out clip" data-start="10" data-duration="1.6" data-track-index="10" style="--pk-pill-enter-delay: 10s; --pk-pill-exit-delay: 11.6s;">in progress</span>
                <span class="pk-pill pk-pill--completed pk-pill--swap-in clip" data-start="12" data-duration="8" data-track-index="11" style="--pk-pill-enter-delay: 12s;">completed</span>
              </div>
            </div>
          </div>

          <!-- Cursor glides in once and parks over the shared card slot's
               pill; two more click pulses fire in place (x0==x1, y0==y1, so
               no second glide) so each beat's pill flip gets its own click. -->
          <div class="pk-cursor clip" data-start="2.8" data-duration="17.2" data-track-index="12" style="--pk-cursor-delay: 2.8s; --pk-cursor-x0: 620px; --pk-cursor-y0: 160px; --pk-cursor-x1: 145px; --pk-cursor-y1: 370px;">
            <div class="pk-cursor__glyph"></div>
            <div class="pk-cursor__ring" style="--pk-click-delay: 4s;"></div>
          </div>
          <div class="pk-cursor clip" data-start="8" data-duration="0.6" data-track-index="13" style="--pk-cursor-delay: 8s; --pk-cursor-x0: 145px; --pk-cursor-y0: 370px; --pk-cursor-x1: 145px; --pk-cursor-y1: 370px;">
            <div class="pk-cursor__glyph"></div>
            <div class="pk-cursor__ring" style="--pk-click-delay: 8s;"></div>
          </div>
          <div class="pk-cursor clip" data-start="12" data-duration="0.6" data-track-index="14" style="--pk-cursor-delay: 12s; --pk-cursor-x0: 145px; --pk-cursor-y0: 370px; --pk-cursor-x1: 145px; --pk-cursor-y1: 370px;">
            <div class="pk-cursor__glyph"></div>
            <div class="pk-cursor__ring" style="--pk-click-delay: 12s;"></div>
          </div>

          <!-- Toast: the recap confirmation, once the third beat lands. -->
          <div class="pk-toast clip" data-start="14" data-duration="6" data-track-index="15" style="animation-delay: 14s;">
            <div class="pk-toast__icon"></div>
            <div class="pk-toast__body">
              <div class="pk-toast__title" id="toastTitle">3 releases shipped</div>
              <div class="pk-toast__text" id="toastBody">0.18.0 to 0.20.0 in six days.</div>
            </div>
          </div>

          <!-- Outro headline moment. -->
          <div class="pk-outro clip" data-start="16" data-duration="4" data-track-index="16" style="animation-delay: 16s;">roboco.tech</div>
        </div>
      </div>
    </div>

    <script>
      // Register the composition timeline metadata. Motion is driven by CSS
      // keyframes (no GSAP - the render is offline, no CDN), but HyperFrames
      // requires the registry entry to consider the composition valid.
      window.__timelines = window.__timelines || {};
      window.__timelines["release-recap"] = {
        id: "release-recap",
        duration: 20,
        fps: 30,
        animations: []
      };

      // Read sidecar-supplied props (props.js is overwritten at render time)
      // and populate the DOM. Defensive: a missing prop leaves the
      // placeholder text already in the markup intact rather than throwing.
      (function () {
        var props = (window.__PROPS__ && typeof window.__PROPS__ === "object") ? window.__PROPS__ : {};

        function setText(id, value) {
          if (typeof value !== "string" || !value) return;
          var el = document.getElementById(id);
          if (el) el.textContent = value;
        }

        setText("toastTitle", props.toastTitle);
        setText("toastBody", props.toastBody);

        var typeEl = document.getElementById("typeIntro");
        if (typeEl) {
          if (typeof props.introText === "string" && props.introText) {
            typeEl.textContent = props.introText;
          }
          window.PanelKit.typeText(typeEl, { delay: 0.6 });
        }
      })();
    </script>
  </body>
</html>
