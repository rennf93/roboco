# Production Overlay for RoboCo
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: roboco

resources:
  - ../../base
  # Sealed secrets for production
  # - sealed-secrets.yaml

# Production-specific patches
patches:
  # Increase API replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: roboco-api
  # Increase resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
    target:
      kind: Deployment
      name: roboco-api
  # Production PostgreSQL resources
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
    target:
      kind: StatefulSet
      name: postgres

# Image tags for production
images:
  - name: ghcr.io/renzof/roboco-api
    newTag: stable
  - name: ghcr.io/renzof/roboco-orchestrator
    newTag: stable

# Config overrides
configMapGenerator:
  - name: roboco-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DEBUG=false
