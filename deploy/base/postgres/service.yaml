# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: roboco
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
