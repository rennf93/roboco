name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-image:
    name: Build & push orchestrator image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/rennf93/roboco

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          # On a published release, github.ref_name is the tag (e.g. v0.1.0);
          # strip a leading "v" for the semver image tag. On workflow_dispatch
          # against a branch, fall back to the short SHA.
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          VERSION="${RAW#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "master" ]; then
            VERSION="$(git rev-parse --short HEAD)"
          fi
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/orchestrator.Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
